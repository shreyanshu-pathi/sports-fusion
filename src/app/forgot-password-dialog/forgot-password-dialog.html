<h2 mat-dialog-title>Forgot Password</h2>

<mat-dialog-content>

    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="email">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
        <mat-label>New Password</mat-label>
        <input matInput type="password" [(ngModel)]="newPassword">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
        <mat-label>Confirm Password</mat-label>
        <input matInput type="password" [(ngModel)]="confirmPassword">
    </mat-form-field>

</mat-dialog-content>

<mat-dialog-actions>
    <button mat-stroked-button align="end" (click)="close()">Cancel</button>
    <button mat-raised-button (click)="resetPassword()">Reset Password</button>
</mat-dialog-actions>
