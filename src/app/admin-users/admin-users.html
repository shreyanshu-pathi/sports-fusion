<div class="usersContainer">

    <div class="glassCard">

        <!-- Search Filter -->
        <div class="tableActions">

            <h2>Registered Users</h2>

            <mat-form-field appearance="outline" class="searchField">
                <mat-label>Search Users</mat-label>
                <input matInput placeholder="Search by name, email or phone" (keyup)="applyFilter($event)">
                <mat-icon matSuffix>search</mat-icon>
            </mat-form-field>

        </div>

        <!-- Table -->
        <table mat-table [dataSource]="dataSource" class="glassTable" matSort>

            <!-- Name -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
                <td mat-cell *matCellDef="let user">
                    {{ user.name }}
                </td>
            </ng-container>

            <!-- Email -->
            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef>Email</th>
                <td mat-cell *matCellDef="let user">
                    {{ user.email }}
                </td>
            </ng-container>

            <!-- Phone -->
            <ng-container matColumnDef="phone">
                <th mat-header-cell *matHeaderCellDef>Phone</th>
                <td mat-cell *matCellDef="let user">
                    {{ user.phone }}
                </td>
            </ng-container>

            <!-- Total Bookings -->
            <ng-container matColumnDef="totalBookings">
                <th mat-header-cell *matHeaderCellDef>Bookings</th>
                <td mat-cell *matCellDef="let user">

                    <span class="bookingBadge">
                        {{ user.totalBookings }}
                    </span>

                </td>
            </ng-container>

            <!-- Actions -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Actions</th>

                <td mat-cell *matCellDef="let user">

                    <div class="actionBtn">

                        <!-- Edit Button -->
                        <button class="editBtn" (click)="openEditDialog(user)" matTooltip="Edit User"
                            matTooltipPosition="above">
                            <mat-icon>edit</mat-icon>
                        </button>
                        
                        <!-- Delete Button -->
                        <button class="deleteBtn" (click)="deleteUser(user)" matTooltip="Delete User"
                            matTooltipPosition="above">
                            <mat-icon>delete</mat-icon>
                        </button>

                    </div>

                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

            <tr mat-row *matRowDef="let row; columns: displayedColumns;">
            </tr>

        </table>

    </div>

</div>
