<div class="usersContainer">

    <div class="glassCard">

        <h2>Registered Users</h2>

        <table mat-table [dataSource]="users" class="glassTable" matSort>

            <!-- Name -->
            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
                <td mat-cell *matCellDef="let user">
                    {{ user.name }}
                </td>
            </ng-container>

            <!-- Email -->
            <ng-container matColumnDef="email">
                <th mat-header-cell *matHeaderCellDef>Email</th>
                <td mat-cell *matCellDef="let user">
                    {{ user.email }}
                </td>
            </ng-container>

            <!-- Phone -->
            <ng-container matColumnDef="phone">
                <th mat-header-cell *matHeaderCellDef>Phone</th>
                <td mat-cell *matCellDef="let user">
                    {{ user.phone }}
                </td>
            </ng-container>

            <!-- Member Since -->
            <ng-container matColumnDef="memberSince">
                <th mat-header-cell *matHeaderCellDef>Member Since</th>
                <td mat-cell *matCellDef="let user">
                    {{ user.memberSince }}
                </td>
            </ng-container>

            <!-- Total Bookings -->
            <ng-container matColumnDef="totalBookings">
                <th mat-header-cell *matHeaderCellDef>Bookings</th>
                <td mat-cell *matCellDef="let user">

                    <span class="bookingBadge">
                        {{ user.totalBookings }}
                    </span>

                </td>
            </ng-container>

            <!-- Actions -->
            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Action</th>

                <td mat-cell *matCellDef="let user">

                    <button
                        class="deleteBtn"
                        (click)="deleteUser(user.email)">

                        Delete

                    </button>

                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

            <tr
                mat-row
                *matRowDef="let row; columns: displayedColumns;">
            </tr>

        </table>

    </div>

</div>
